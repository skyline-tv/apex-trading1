services:
  - type: web
    name: apex-trading-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: OPENAI_API_KEY
        sync: false
      - key: APEX_API_TOKEN
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: TRADES_DB_PATH
        value: /var/data/trades.db
